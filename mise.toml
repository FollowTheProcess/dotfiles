[tasks.fmt]
description = "Format all nix code"
run = "nix fmt"

[tasks.lint]
description = "Check the nix flake"
run = ["nix flake check", "statix check"]

[tasks.update]
description = "Update flake.lock"
run = "nix flake update"

[tasks.check]
description = "Run all checks"
depends = ["fmt", "lint"]
