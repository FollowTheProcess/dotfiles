# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
  # JankyBorders has a built-in detection of already running process,
  # so it won't be run twice on AeroSpace restart
  # See .config/borders/bordersrc for config.
  # Launching is handled by `brew services`
  # "exec-and-forget borders"

  # OCD, always start on workspace 1. macOS brings login apps (notably
  # Finder) to the foreground after aerospace's startup finishes, and
  # their focus event drags us to whichever workspace those windows
  # happen to live on. Defer past the shuffle so workspace 1 wins.
  "exec-and-forget /bin/bash -c 'sleep 5 && /opt/homebrew/bin/aerospace workspace 1'",
]

# Notify sketchybar about workspace changes
exec-on-workspace-change = [
  "/bin/bash",
  "-c",
  "/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = "tiles"

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = "auto"

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = []

# Refresh sketchybar workspace indicators on every focus change. Covers the
# window-close case: aerospace has no on-window-destroyed callback, but
# closing a window usually shifts focus to a neighbour, which fires this.
on-focus-changed = [
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$(/opt/homebrew/bin/aerospace list-workspaces --focused)"
]

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
#
# I don't use these
#
# persistent-workspaces = [
#   "1",
#   "2",
#   "3",
#   "4",
#   "5",
#   "6",
#   "7",
#   "8",
#   "9",
# ]

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = "qwerty"

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = [{ monitor."U32R59x" = 10 }, { monitor.built-in = 6 }, 6]
outer.bottom = [{ monitor."U32R59x" = 10 }, { monitor.built-in = 10 }, 10]
outer.top = [{ monitor."U32R59x" = 42 }, { monitor.built-in = 6 }, 6]
outer.right = [{ monitor."U32R59x" = 10 }, { monitor.built-in = 6 }, 6]

# Pin workspaces to monitors so new windows land predictably (no more
# stray "workspace 10" on whichever screen happens to be focused).
# Patterns are tried in order; the first matching monitor wins. ws1
# stays on the laptop (which sits to the left of the external when
# docked), and ws2 lives on the U32R59x when connected, falling back
# to the laptop when it isn't.

# Pin workspaces to monitors so it's predictable. When connected to my external
# monitor my macbook is on the left so 1 makes more brain sense to me
# See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[workspace-to-monitor-force-assignment]
1 = "built-in"
2 = ["U32R59x", "built-in"]

# Auto-route apps to workspaces / layouts when a new window appears.
# See: https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback

# Nudge sketchybar to refresh its per-workspace app icons on every new window.
# exec-on-workspace-change only fires when the focused workspace changes, so an
# app launched into the already-focused workspace would otherwise not show up
# on the bar until you switch back and forth.
# check-further-callbacks lets the per-app rules below still match.
# AEROSPACE_FOCUSED_WORKSPACE is only exported for exec-on-workspace-change, so
# query the focused workspace directly here.
[[on-window-detected]]
check-further-callbacks = true
run = [
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$(/opt/homebrew/bin/aerospace list-workspaces --focused)"
]

# Apps that don't play nicely with tiling — keep them floating.
[[on-window-detected]]
if.app-id = "com.apple.systempreferences"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.apple.calculator"
run = "layout floating"

# Brain.fm is a mini-player, not a real tileable window.
[[on-window-detected]]
if.app-id = "com.electron.brain.fm"
run = "layout floating"

# Docker doesn't tile well for some reason, always hangs over monitor boundaries
[[on-window-detected]]
if.app-id = "com.electron.dockerdesktop"
run = "layout floating"

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]
# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
#                   sectionSign (ISO keyboards only, european keyboards only)
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut
# (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
# Cycle windows via depth-first traversal so a single left/right pair can
# reach any window regardless of split orientation. Up/down are deliberately
# unbound because cmd+alt+up/down is Zed's add-cursor-above/below shortcut.
alt-cmd-left = "focus dfs-prev"
alt-cmd-right = "focus dfs-next"

# See: https://nikitabobko.github.io/AeroSpace/commands#move
# I've mirrored the setup I had for magnet/raycast here because muscle memory
alt-ctrl-left = "move left"
alt-ctrl-down = "move down"
alt-ctrl-up = "move up"
alt-ctrl-right = "move right"

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-minus = "resize smart -50"
alt-equal = "resize smart +50"

# Numpad equivalents for the external keyboard's +/- keys.
alt-keypadMinus = "resize smart -50"
alt-keypadPlus = "resize smart +50"

# See: https://nikitabobko.github.io/AeroSpace/commands#fullscreen
# Mirrors Raycast's fullscreen shortcut.
ctrl-alt-enter = "fullscreen"

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
# Toggle the focused window between floating and tiled.
ctrl-alt-space = "layout floating tiling"

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
# cmd-alt-N (rather than the conventional alt-N) so that option+3, option+4,
# etc. remain available for typing characters like '#' on the UK layout.
cmd-alt-1 = "workspace 1"
cmd-alt-2 = "workspace 2"
cmd-alt-3 = "workspace 3"
cmd-alt-4 = "workspace 4"
cmd-alt-5 = "workspace 5"
cmd-alt-6 = "workspace 6"
cmd-alt-7 = "workspace 7"
cmd-alt-8 = "workspace 8"
cmd-alt-9 = "workspace 9"

# Numpad equivalents for the external keyboard. Inert when the numpad
# isn't connected, so they coexist with the top-row bindings above.
cmd-alt-keypad1 = "workspace 1"
cmd-alt-keypad2 = "workspace 2"
cmd-alt-keypad3 = "workspace 3"
cmd-alt-keypad4 = "workspace 4"
cmd-alt-keypad5 = "workspace 5"
cmd-alt-keypad6 = "workspace 6"
cmd-alt-keypad7 = "workspace 7"
cmd-alt-keypad8 = "workspace 8"
cmd-alt-keypad9 = "workspace 9"

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
# Each binding also nudges sketchybar so its per-workspace app icons refresh:
# move-node-to-workspace doesn't change focus, so the regular
# exec-on-workspace-change hook wouldn't fire on its own.
alt-shift-1 = [
  "move-node-to-workspace 1",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-2 = [
  "move-node-to-workspace 2",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-3 = [
  "move-node-to-workspace 3",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-4 = [
  "move-node-to-workspace 4",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-5 = [
  "move-node-to-workspace 5",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-6 = [
  "move-node-to-workspace 6",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-7 = [
  "move-node-to-workspace 7",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-8 = [
  "move-node-to-workspace 8",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-9 = [
  "move-node-to-workspace 9",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]

alt-shift-keypad1 = [
  "move-node-to-workspace 1",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-keypad2 = [
  "move-node-to-workspace 2",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-keypad3 = [
  "move-node-to-workspace 3",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-keypad4 = [
  "move-node-to-workspace 4",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-keypad5 = [
  "move-node-to-workspace 5",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-keypad6 = [
  "move-node-to-workspace 6",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-keypad7 = [
  "move-node-to-workspace 7",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-keypad8 = [
  "move-node-to-workspace 8",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]
alt-shift-keypad9 = [
  "move-node-to-workspace 9",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]

# Cycle through workspaces with wrap.
# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
alt-tab = "workspace next --wrap-around"
alt-shift-tab = "workspace prev --wrap-around"

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-monitor
cmd-alt-ctrl-left = "move-node-to-monitor --wrap-around --focus-follows-window prev"
cmd-alt-ctrl-right = "move-node-to-monitor --wrap-around --focus-follows-window next"

# See: https://nikitabobko.github.io/AeroSpace/commands#join-with
# Wraps the focused window and its neighbour into a sub-container, which is how
# you create a nested split (e.g. a horizontal split inside a vertical one).
alt-shift-left = "join-with left"
alt-shift-down = "join-with down"
alt-shift-up = "join-with up"
alt-shift-right = "join-with right"

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-semicolon = [
  "mode service",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_mode_change MODE=service",
]

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = [
  "reload-config",
  "mode main",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_mode_change MODE=main",
]
r = [
  "flatten-workspace-tree",
  "mode main",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_mode_change MODE=main",
]                                                                                            # reset layout
f = [
  "layout floating tiling",
  "mode main",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_mode_change MODE=main",
]                                                                                            # Toggle between floating and tiling layout
backspace = [
  "close-all-windows-but-current",
  "mode main",
  "exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_mode_change MODE=main",
]

# sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
# s = ['layout sticky tiling', 'mode main']
