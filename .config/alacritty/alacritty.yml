live_config_reload: true

font:
  size: 13
  normal:
    family: SFMono Nerd Font
    style: Regular

  bold:
    family: SFMono Nerd Font
    style: Bold

  italic:
    family: SFMono Nerd Font
    style: Italic

colors:
  # Snazzy
  primary:
    background: "0x282a36"
    foreground: "0xeff0eb"

  # Normal colors
  normal:
    black: "0x282a36"
    red: "0xff5c57"
    green: "0x5af78e"
    yellow: "0xf3f99d"
    blue: "0x57c7ff"
    magenta: "0xff6ac1"
    cyan: "0x9aedfe"
    white: "0xf1f1f0"

  # Bright colors
  bright:
    black: "0x686868"
    red: "0xff5c57"
    green: "0x5af78e"
    yellow: "0xf3f99d"
    blue: "0x57c7ff"
    magenta: "0xff6ac1"
    cyan: "0x9aedfe"
    white: "0xf1f1f0"

cursor:
  style:
    shape: Beam

    blinking: On

mouse:
  hide_when_typing: true

window:
  dimensions:
    columns: 160
    lines: 60

  padding:
    x: 8
    y: 12

  decorations: transparent
