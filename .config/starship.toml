"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_macchiato"

[username]
disabled = true

[directory]
read_only = " 󰌾"
style = "bold sky"

[directory.substitutions]
"dotfiles" = "󰋜 dotfiles"
"Development" = "󰲋 dev"

[git_branch]
symbol = " "
style = "bold mauve"

[aws]
disabled = false
style = "bold peach"

[status]
disabled = false
symbol = "✖ "
map_symbol = true  # shows SIGINT etc. as names

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[python]
style = "bold yellow"
symbol = " "

[golang]
style = "bold sapphire"
symbol = " "

[nodejs]
style = "bold green"
symbol = " "

[bun]
style = "bold pink"
symbol = " "

[swift]
style = "bold teal"
symbol = "󰛥 "

[git_status]
# A thin space (U+2009) separates each group and pads the bracket edges
format = '([\[ $all_status$ahead_behind\]]($style) )'
conflicted = "󰘭${count} "
ahead = "↑${count} "
behind = "↓${count} "
diverged = "↕↑${ahead_count} ↓${behind_count} "
untracked = "󰋗${count} "
stashed = "󰏋${count} "
modified = "󰏫${count} "
staged = "󰐗${count} "
renamed = "󰓡${count} "
deleted = "󰩺${count} "
style = "bold peach"

[git_commit]
tag_disabled = false
only_detached = false
tag_max_candidates = 1
style = "bold green"

[docker_context]
style = "bold blue"
symbol = " "

[kubernetes]
disabled = false
detect_env_vars = ["SHOW_STARSHIP_K8S_CONTEXT"]
style = "bold blue"

[git_state]
style = "bold peach"

[cmd_duration]
style = "bold yellow"

[terraform]
symbol = "󱁢 "
style = "bold lavender"

# palette tables should be last in the config ⚓️
[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"
