mode = "local"
project = ""
shell = ""

[dirs]
project = [  ]
python = "isolated"
data = "~/Library/Application Support/hatch"
cache = "~/Library/Caches/hatch"

[dirs.env]
virtual = ".venv"

[projects]

[publish.index]
repo = "main"

[template]
name = "Tom Fleet"
email = "tomfleet2018@gmail.com"

[template.licenses]
headers = true
default = [
    "MIT",
]

[template.plugins.default]
tests = true
ci = false
src-layout = true

[terminal.styles]
info = "bold"
success = "bold green"
error = "bold red"
warning = "bold yellow"
waiting = "bold green"
debug = "bold"
spinner = "dots11"
