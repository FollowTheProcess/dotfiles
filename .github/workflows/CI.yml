name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  nix:
    name: Nix
    permissions:
      contents: read
    uses: FollowTheProcess/ci/.github/workflows/Nix.yml@v4
